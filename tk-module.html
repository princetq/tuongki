<style>
    /* --- TƯƠNG KỴ NATIVE CSS --- */
    #tk-modal .tk-inner-content { padding: 25px; height: 100%; overflow-y: auto; background: var(--bg-color, #e8f5e9); border-radius: 20px; }
    #tk-modal {
        --tk-primary-text: #334155; --tk-accent-color: #16a34a; --tk-accent-dark: #166534;  
        --tk-accent-bg: rgba(240, 253, 244, 0.85); --tk-accent-gradient: linear-gradient(135deg, #4ade80 0%, #16a34a 100%);
        --tk-danger-color: #dc2626; --tk-danger-gradient: linear-gradient(135deg, #f87171 0%, #dc2626 100%);
        --tk-warning-color: #d97706; --tk-search-bg: rgba(255, 255, 255, 0.85);
        --tk-input-bg: #ffffff; --tk-input-border: #e2e8f0; --tk-input-focus: #ffffff;
        --tk-sugg-bg: #ffffff; --tk-sugg-border: #e2e8f0; --tk-sugg-hover: #f0fdf4;
        --tk-panel-bg: rgba(255, 255, 255, 0.85); --tk-th-bg: var(--tk-accent-color); --tk-th-text: white;
        --tk-td-bg: #ffffff; --tk-td-border: #e2e8f0; --tk-td-first-bg: #f8fafc;
        --tk-m-card-bg: #ffffff; --tk-m-card-border: #e2e8f0; --tk-m-header-bg: var(--tk-accent-color);
        --tk-m-header-text: white; --tk-m-row-border: rgba(0, 0, 0, 0.1); --tk-legend-bg: #ffffff;
        --tk-empty-text-color: #003366; 
        --tk-st-c-bg: #dcfce7; --tk-st-c-text: #166534; --tk-st-c-border: #86efac;
        --tk-st-i-bg: #fee2e2; --tk-st-i-text: #991b1b; --tk-st-i-border: #fca5a5;
        --tk-st-n-bg: #fef9c3; --tk-st-n-text: #854d0e; --tk-st-n-border: #fde047;
        --tk-st-v-bg: #ffedd5; --tk-st-v-text: #9a3412; --tk-st-v-border: #fdba74;
        --tk-st-self-bg: rgba(0, 0, 0, 0.05); --tk-st-self-text: #cbd5e1;
        --tk-td-drug-color: var(--tk-accent-dark); --tk-td-drug-bg: var(--tk-accent-bg);
        --tk-td-corner-bg: var(--tk-accent-dark); --tk-td-corner-text: var(--tk-th-text);
    }
    #tk-modal .tk-header { text-align:center; margin-bottom: 20px; }
    #tk-modal .tk-header h2 { font-size: 20px; color: var(--tk-accent-dark); margin: 0; text-transform: uppercase; }
    #tk-modal .tk-search-container { position: relative; background: var(--tk-search-bg); border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--tk-input-border); margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
    #tk-modal .tk-input-wrapper { position: relative; flex: 1; min-width: 250px; }
    #tk-modal input { width: 100%; padding: 12px 15px; border-radius: 12px; background: var(--tk-input-bg); border: 2px solid var(--tk-input-border); font-size: 15px; color: var(--tk-accent-dark); font-weight: 600; outline: none; }
    #tk-modal input:focus { border-color: var(--tk-accent-color); box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15); }
    #tk-modal .tk-btn-search { padding: 12px 25px; font-size: 15px; font-weight: 700; background: var(--tk-accent-gradient); color: white; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 15px rgba(22, 163, 74, 0.3); white-space: nowrap; }
    #tk-modal .tk-btn-reset { background: var(--tk-danger-gradient); box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3); }
    #tk-modal .tk-suggestions { position: absolute; top: 100%; left: 0; margin-top: 5px; width: 100%; background: var(--tk-sugg-bg); border: 1px solid var(--tk-sugg-border); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100; max-height: 250px; overflow-y: auto; display: none; }
    #tk-modal .tk-suggestions div { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 14px; color: var(--tk-primary-text); font-weight: 500; }
    #tk-modal .tk-suggestions div:hover { background: var(--tk-sugg-hover); color: var(--tk-accent-dark); }
    #tk-modal .tk-error-message { display: none; margin: 15px 0; padding: 12px; background: var(--tk-st-i-bg); color: var(--tk-st-i-text); border-radius: 10px; border: 1px solid var(--tk-st-i-border); text-align: center; font-weight: 600; font-size: 14px; }
    #tk-modal .tk-rotate-warning { display: none; background: #fff3cd; color: #856404; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ffeeba; text-align: center; font-size: 13px; font-weight: 700; }
    #tk-modal .tk-result-panel { background: var(--tk-panel-bg); border-radius: 16px; padding: 15px; border: 1px solid var(--tk-sugg-border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    #tk-modal table { width: 100%; border-collapse: separate; border-spacing: 3px; margin-bottom: 15px; }
    #tk-modal th { background: var(--tk-th-bg); color: var(--tk-th-text); padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 700; text-transform: uppercase; }
    #tk-modal td { padding: 8px; text-align: center; background: var(--tk-td-bg); border-radius: 6px; font-size: 13px; color: var(--tk-primary-text); border: 1px solid var(--tk-td-border); }
    #tk-modal td:first-child { text-align: center; font-weight: 700; color: var(--tk-accent-dark); background: var(--tk-td-first-bg); min-width: 100px; }
    #tk-modal .tk-selected-drugs td { text-align: left; padding: 8px 12px; background: var(--tk-td-bg); }
    #tk-modal .tk-compatible { background-color: var(--tk-st-c-bg) !important; color: var(--tk-st-c-text) !important; font-weight: bold; border: 1px solid var(--tk-st-c-border) !important; }
    #tk-modal .tk-incompatible { background-color: var(--tk-st-i-bg) !important; color: var(--tk-st-i-text) !important; font-weight: bold; border: 1px solid var(--tk-st-i-border) !important; }
    #tk-modal .tk-na { background-color: var(--tk-st-n-bg) !important; color: var(--tk-st-n-text) !important; font-weight: bold; border: 1px solid var(--tk-st-n-border) !important; }
    #tk-modal .tk-controversial { background-color: var(--tk-st-v-bg) !important; color: var(--tk-st-v-text) !important; font-weight: bold; border: 1px solid var(--tk-st-v-border) !important; }
    #tk-modal .tk-self-intersection { background-color: var(--tk-st-self-bg) !important; color: var(--tk-st-self-text) !important; }
    #tk-modal .tk-delete-btn { background: var(--tk-st-i-bg); color: var(--tk-st-i-border); border: 1px solid var(--tk-st-i-border); width: 24px; height: 24px; border-radius: 50%; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; float: right; }
    #tk-modal .tk-legend { margin-top: 15px; display: none; text-align: center; background: var(--tk-legend-bg); padding: 12px; border-radius: 12px; }
    #tk-modal .tk-legend span { display: inline-flex; align-items: center; gap: 6px; margin: 4px 8px; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    #tk-modal .tk-mobile-results { display: none; }
    
    @media (max-width: 600px) {
        #tk-modal .tk-search-container { flex-direction: column; padding: 15px; }
        #tk-modal .tk-input-wrapper { width: 100%; min-width: unset; }
        #tk-modal .tk-btn-search { width: 100%; }
        #tk-modal .tk-result-table-wrapper { display: none; }
        #tk-modal .tk-result-panel { padding: 10px; }
        #tk-modal .tk-mobile-results { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        #tk-modal .tk-m-card { background: var(--tk-m-card-bg); border: 1px solid var(--tk-m-card-border); border-radius: 8px; overflow: hidden; width: 100%; }
        #tk-modal .tk-m-card-header { background: var(--tk-m-header-bg); color: var(--tk-m-header-text); padding: 6px 10px; font-weight: 700; font-size: 11px; text-align: center; }
        #tk-modal .tk-m-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-bottom: 1px solid var(--tk-m-row-border); font-size: 12px; }
        #tk-modal .tk-m-drug-name { font-weight: 500; color: var(--tk-primary-text); max-width: 70%; word-break: break-word; }
        #tk-modal .tk-m-badge { padding: 2px 8px; border-radius: 10px; font-weight: 700; font-size: 10px; min-width: 60px; text-align: center; }
        #tk-modal .tk-legend { text-align: left; }
        #tk-modal .tk-legend span { display: flex; width: 100%; margin: 2px 0; justify-content: flex-start; }
        #tk-modal .tk-selected-drugs tr { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--tk-m-card-bg); border-radius: 8px; margin-bottom: 6px; border: 1px solid var(--tk-td-border); width: 100%; }
        #tk-modal .tk-selected-drugs td { display: block; border: none; padding: 0; }
        #tk-modal .tk-selected-drugs td:first-child { text-align: left; }
    }
</style>

<div class="tk-inner-content">
    <div class="tk-header">
        <h2><i class="fas fa-flask"></i> Tương hợp - Tương kỵ</h2>
    </div>
    
    <div class="tk-search-container">
        <div class="tk-input-wrapper">
            <input type="text" id="tk-searchInput" placeholder="Nhập tên hoạt chất..." autocomplete="off" oninput="tk_showSuggestions()">
            <div class="tk-suggestions" id="tk-suggestions"></div>
        </div>
        <button id="tk-actionBtn" class="tk-btn-search" onclick="tk_searchCompatibility()">
            <i class="fas fa-search"></i> Tạo bảng kết quả
        </button>
    </div>

    <div class="tk-error-message" id="tk-errorMessage"></div>
    
    <div id="tk-rotateWarning" class="tk-rotate-warning">
        <i class="fas fa-sync-alt fa-spin"></i> Bạn đã chọn nhiều thuốc. Hãy xoay ngang điện thoại để hiển thị kết quả tốt nhất.
    </div>

    <div class="tk-result-panel">
        <div class="tk-result-table-wrapper" id="tk-desktopTableWrapper">
            <table>
                <thead>
                    <tr><th id="tk-tableHeaderTitle" colspan="100">THÔNG TIN KẾT QUẢ</th></tr>
                </thead>
                <tbody id="tk-tableBody" class="tk-selected-drugs">
                    <tr><td colspan="2" style="text-align: center; color: var(--tk-empty-text-color); border: none; background: transparent;">Danh sách trống. Vui lòng nhập tên thuốc.</td></tr>
                </tbody>
            </table>
        </div>

        <div class="tk-mobile-results" id="tk-mobileResults"></div>

        <div id="tk-legend" class="tk-legend">
            <span class="tk-compatible"><i class="fas fa-check"></i> C: Tương hợp</span>
            <span class="tk-incompatible"><i class="fas fa-times"></i> I: Tương kỵ</span>
            <span class="tk-na"><i class="fas fa-question"></i> N: Không có thông tin</span>
            <span class="tk-controversial"><i class="fas fa-exclamation-triangle"></i> V: Mâu thuẫn tài liệu</span>
        </div>
    </div>
</div>

<script>
    let tk_jsonData = null;
    let tk_selectedDrugs = [];
    let tk_suggestionsList = [];
    let tk_isTableGenerated = false; 

    function tk_normalizeString(str) { return str.trim().toLowerCase().replace(/\s+/g,' '); }

    async function tk_fetchData() {
        if(tk_jsonData) return; 
        const errorMessage = document.getElementById("tk-errorMessage");
        try {
            const response = await fetch('https://princetq.github.io/tuongki/tuong_ky_thuoc.json?t=' + new Date().getTime()); 
            tk_jsonData = await response.json();
            tk_suggestionsList = [...new Set(tk_jsonData.incompatibilities.flatMap(item => [item.drug1, item.drug2]))].sort();
        } catch (error) {
            errorMessage.textContent = `LỖI TẢI DỮ LIỆU: ${error.message}`;
            errorMessage.style.display = "block";
        }
    }

    function tk_checkRotationWarning() {
        const warning = document.getElementById('tk-rotateWarning');
        if (window.innerWidth <= 600 && tk_selectedDrugs.length >= 3) {
            warning.style.display = 'block'; 
        } else {
            warning.style.display = 'none'; 
        }
    }

    function tk_setButtonToUpdateMode() {
        const btn = document.getElementById('tk-actionBtn');
        if (tk_isTableGenerated) {
            btn.innerHTML = '<i class="fas fa-sync-alt"></i> Cập nhật kết quả';
            btn.className = 'tk-btn-search'; 
        } else {
            btn.innerHTML = '<i class="fas fa-search"></i> Tạo bảng kết quả';
            btn.className = 'tk-btn-search';
        }
    }

    function tk_addDrugToTable(drug) {
        if (!tk_selectedDrugs.includes(drug)) { 
            tk_selectedDrugs.push(drug); 
            tk_checkRotationWarning(); 
            tk_isTableGenerated = false; 
            tk_updateSelectedDrugsTable(); 
            tk_setButtonToUpdateMode();
        }
    }

    function tk_removeDrug(drug) {
        tk_selectedDrugs = tk_selectedDrugs.filter(d => d !== drug);
        tk_checkRotationWarning(); 
        if (!tk_isTableGenerated) {
            tk_updateSelectedDrugsTable();
        } else {
            tk_setButtonToUpdateMode();
        }
    }

    function tk_updateSelectedDrugsTable() {
        document.getElementById("tk-desktopTableWrapper").style.display = "block";
        document.getElementById("tk-mobileResults").style.display = "none";
        document.getElementById("tk-mobileResults").innerHTML = ""; 

        const tableBody = document.getElementById("tk-tableBody");
        tableBody.classList.add("tk-selected-drugs"); 
        document.getElementById("tk-legend").style.display = "none";
        document.getElementById("tk-tableHeaderTitle").textContent = "THÔNG TIN KẾT QUẢ";

        tableBody.innerHTML = "";
        if (tk_selectedDrugs.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="2" style="text-align: center; color: var(--tk-empty-text-color); border: none; background: transparent;">Danh sách trống. Vui lòng nhập tên thuốc.</td></tr>`;
            return;
        }
        tableBody.innerHTML = tk_selectedDrugs.map(drug => `
            <tr>
                <td>${drug}</td>
                <td style="width: 50px;">
                    <button type="button" class="tk-delete-btn" onclick="tk_removeDrug('${drug.replace(/'/g,"\\'")}')"><i class="fas fa-times"></i></button>
                </td>
            </tr>`).join('');
    }

    function tk_showSuggestions() {
        const input = tk_normalizeString(document.getElementById("tk-searchInput").value);
        const suggestionsBox = document.getElementById("tk-suggestions");
        if (!input) { suggestionsBox.style.display='none'; return; }
        const filtered = tk_suggestionsList.filter(item => tk_normalizeString(item).includes(input));
        if (filtered.length === 0) { suggestionsBox.style.display='none'; return; }
        suggestionsBox.innerHTML = filtered.map(item => `<div onclick="tk_selectSuggestion('${item.replace(/'/g,"\\'")}')">${item}</div>`).join('');
        suggestionsBox.style.display='block';
    }

    function tk_selectSuggestion(value) {
        document.getElementById("tk-searchInput").value = ""; 
        document.getElementById("tk-suggestions").style.display='none';
        tk_addDrugToTable(value);
        document.getElementById("tk-searchInput").focus();
    }

    function tk_resetTable() {
        tk_selectedDrugs = [];
        tk_isTableGenerated = false; 
        document.getElementById("tk-errorMessage").style.display='none';
        document.getElementById("tk-rotateWarning").style.display='none'; 
        tk_updateSelectedDrugsTable();
        tk_setButtonToUpdateMode();
    }

    function tk_toggleCell(cell, symbol, text) {
        if (cell.textContent.trim() === symbol) {
            cell.textContent = text;
            cell.style.fontSize = "11px"; 
            cell.style.padding = "4px";
        } else {
            cell.textContent = symbol;
            cell.style.fontSize = ""; 
            cell.style.padding = "";
        }
    }

    function tk_searchCompatibility() {
        const tableBody = document.getElementById("tk-tableBody");
        const errorMessage = document.getElementById("tk-errorMessage");
        
        tableBody.classList.remove("tk-selected-drugs");
        tableBody.innerHTML="";
        errorMessage.style.display='none';

        if (tk_selectedDrugs.length < 2) {
            errorMessage.innerHTML = "<i class='fas fa-exclamation-circle'></i> VUI LÒNG CHỌN ÍT NHẤT 2 THUỐC";
            errorMessage.style.display='block';
            tk_isTableGenerated = false;
            tk_updateSelectedDrugsTable();
            return;
        }

        tk_isTableGenerated = true;
        document.getElementById("tk-tableHeaderTitle").textContent = "BẢNG KẾT QUẢ TƯƠNG KỴ";

        let tableHtml = '<tr><td style="background:#166534; color:white; font-weight:800; text-align:center; border-radius:8px; border: none;">THUỐC</td>'; 
        tk_selectedDrugs.forEach(drug=>{tableHtml+=`<td style="font-weight:bold; background:rgba(240, 253, 244, 0.85); color:#166534; border-color: transparent;">${drug}</td>`});
        tableHtml+='</tr>';

        let mobileHtml = '';

        tk_selectedDrugs.forEach((drug1,index1)=>{
            tableHtml+=`<tr><td style="font-weight:bold; background:rgba(240, 253, 244, 0.85); color:#166534; text-align:center; border-color: transparent;">${drug1}</td>`;
            mobileHtml += `<div class="tk-m-card"><div class="tk-m-card-header">${drug1}</div>`;

            tk_selectedDrugs.forEach((drug2,index2)=>{
                let statusClass = "tk-na";
                let statusText = "N";
                let statusLabel = "Không rõ";

                if(index1===index2){ 
                    tableHtml+='<td class="tk-self-intersection"><i class="fas fa-minus"></i></td>'; 
                } else {
                    const pair = tk_jsonData.incompatibilities.find(item=>
                        (tk_normalizeString(item.drug1)===tk_normalizeString(drug1) && tk_normalizeString(item.drug2)===tk_normalizeString(drug2)) ||
                        (tk_normalizeString(item.drug1)===tk_normalizeString(drug2) && tk_normalizeString(item.drug2)===tk_normalizeString(drug1))
                    );
                    if(pair){ 
                        if(pair.status==="incompatible"){ statusClass="tk-incompatible"; statusText="I"; statusLabel="Tương kỵ"; }
                        else if(pair.status==="unknown"){ statusClass="tk-na"; statusText="N"; statusLabel="Không rõ"; }
                        else if(pair.status==="compatible"){ statusClass="tk-compatible"; statusText="C"; statusLabel="Tương hợp"; }
                        else if(pair.status==="controversial"){ statusClass="tk-controversial"; statusText="V"; statusLabel="Mâu thuẫn"; }
                    }
                    
                    tableHtml+=`<td class="${statusClass}" onclick="tk_toggleCell(this, '${statusText}', '${statusLabel}')" style="cursor:pointer; user-select:none;">${statusText}</td>`;

                    mobileHtml += `
                        <div class="tk-m-row">
                            <span class="tk-m-drug-name">vs ${drug2}</span>
                            <span class="tk-m-badge ${statusClass}">${statusLabel}</span>
                        </div>
                    `;
                }
            });
            
            tableHtml+='</tr>';
            mobileHtml += `</div>`; 
        });

        tableBody.innerHTML = tableHtml; 
        document.getElementById("tk-mobileResults").innerHTML = mobileHtml; 
        document.getElementById("tk-legend").style.display="block";
        
        const btn = document.getElementById('tk-actionBtn');
        btn.innerHTML = '<i class="fas fa-redo"></i> Làm lại';
        btn.className = 'tk-btn-search tk-btn-reset'; 
        btn.setAttribute('onclick', 'tk_resetTable()');
        
        if(window.innerWidth <= 600) {
            document.getElementById("tk-desktopTableWrapper").style.display = "none";
            document.getElementById("tk-mobileResults").style.display = "flex";
        }
    }

    // Kích hoạt nạp dữ liệu JSON ngay khi component được chèn vào
    tk_fetchData();
</script>
