<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tra cứu Tương hợp Y-Site - Glass Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- BỘ MÀU CHỦ ĐẠO (GLASS THEME) --- */
        :root {
            /* PC: Giữ nguyên */
            --glass-bg: rgba(255, 255, 255, 0.05); 
            --glass-card: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.35);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
            --primary-text: #334155; 
            
            --accent-color: #16a34a; 
            --accent-dark: #166534;  
            --accent-bg: rgba(240, 253, 244, 0.7); 
            --accent-gradient: linear-gradient(135deg, #4ade80 0%, #16a34a 100%);
            
            --danger-color: #dc2626;
            --danger-gradient: linear-gradient(135deg, #f87171 0%, #dc2626 100%);
            --warning-color: #d97706;
            --neutral-color: #64748b;
            --na-bg: #fef9c3; 

            /* BIẾN MỚI THÊM CHO YÊU CẦU */
            --empty-text: #003366; /* Màu xanh than cho dòng danh sách trống */
            --footer-text: #ffffff; /* Footer màu trắng ở light mode */
            --flask-size: 36px;
        }

        /* --- DARK MODE (RỪNG PHÉP THUẬT) --- */
        body.dark-mode {
            --glass-bg: rgba(5, 25, 15, 0.45);
            --glass-card: rgba(10, 35, 20, 0.65);
            --glass-border: rgba(100, 255, 150, 0.25);
            --glass-shadow: 0 8px 32px 0 rgba(20, 255, 100, 0.15);
            --primary-text: #e2f8e5; 
            
            --accent-color: #4ade80; 
            --accent-dark: #22c55e;
            --accent-bg: rgba(15, 50, 25, 0.85); 
            --accent-gradient: linear-gradient(135deg, #4ade80 0%, #16a34a 100%);
            
            --danger-color: #ef4444;
            --danger-gradient: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
            --warning-color: #fbbf24;
            --neutral-color: #a7d3b0;
            --na-bg: rgba(133, 77, 14, 0.4);

            --empty-text: #a7d3b0; 
            --footer-text: #4ade80;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--primary-text);
            background: transparent;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: color 0.5s;
        }

        /* DÙNG CHUNG ẢNH NỀN TUONGKI.JPG */
        .ambient-light {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('tuongki.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1; pointer-events: none;
            transition: background 0.5s ease;
        }
        /* Darkmode thêm lớp mờ tối đè lên ảnh gốc */
        body.dark-mode .ambient-light {
            background-image: linear-gradient(135deg, rgba(2, 10, 5, 0.5) 0%, rgba(5, 20, 10, 0.8) 100%), url('tuongki.jpg');
        }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            width: 100%;
            flex: 1; 
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 25px; margin-bottom: 25px;
            box-shadow: var(--glass-shadow);
            text-align: center;
            transition: background 0.5s, border-color 0.5s;
        }
        body.dark-mode header { background: rgba(10, 35, 20, 0.55); }

        header h2 {
            font-size: 26px; font-weight: 800; 
            color: var(--accent-dark); 
            margin: 0; display: flex; align-items: center; justify-content: center; gap: 15px;
            text-transform: uppercase;
            transition: color 0.5s;
        }

        /* Nút bình thí nghiệm đổi Theme */
        .theme-btn {
            background: transparent; border: none; padding: 0; margin: 0;
            cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent;
            transition: transform 0.3s ease;
        }
        .theme-btn:hover { transform: scale(1.1) rotate(10deg); }
        .theme-btn i {
            font-size: var(--flask-size);
            color: var(--accent-dark);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
            transition: color 0.5s;
        }

        /* --- SEARCH BOX --- */
        .search-container {
            position: relative;
            z-index: 50; /* ĐẢM BẢO KHUNG TÌM KIẾM LUÔN NỔI TRÊN BẢNG KẾT QUẢ */
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 30px; padding: 25px;
            box-shadow: var(--glass-shadow);
            border: 1px solid var(--glass-border);
            margin-bottom: 30px;
            display: flex; gap: 10px; flex-wrap: wrap;
            align-items: flex-start;
            transition: background 0.5s, border-color 0.5s;
        }

        .input-wrapper { position: relative; flex: 1; min-width: 250px; z-index: 51; }

        input {
            width: 100%; padding: 15px 20px;
            border-radius: 16px; 
            background: rgba(255, 255, 255, 0.45); 
            border: 2px solid rgba(255, 255, 255, 0.65);
            font-size: 16px; color: var(--accent-dark); font-weight: 600;
            outline: none; transition: all 0.2s;
        }
        body.dark-mode input { background: rgba(10, 35, 20, 0.7); border-color: rgba(100, 255, 150, 0.25); color: white; }
        
        input:focus { background: #ffffff; border-color: var(--accent-color); box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.15); }
        body.dark-mode input:focus { background: rgba(15, 45, 25, 0.9); box-shadow: 0 0 15px rgba(74, 222, 128, 0.3); }

        .btn-search {
            padding: 15px 30px; font-size: 16px; font-weight: 700;
            background: var(--accent-gradient); color: white;
            border: none; border-radius: 16px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(22, 163, 74, 0.3);
            transition: all 0.2s; white-space: nowrap;
        }
        body.dark-mode .btn-search { color: #05190f; }
        .btn-search:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(22, 163, 74, 0.4); }

        .btn-reset {
            background: var(--danger-gradient) !important;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3) !important;
        }
        .btn-reset:hover { box-shadow: 0 8px 20px rgba(220, 38, 38, 0.4) !important; }

        /* SUGGESTIONS: DẠNG POPUP NỔI LÊN (POSITION ABSOLUTE) */
        .suggestions {
            position: absolute; top: calc(100% + 5px); left: 0; right: 0;
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            z-index: 1000; 
            max-height: 250px; overflow-y: auto; display: none;
            transition: background 0.5s, border-color 0.5s;
        }
        body.dark-mode .suggestions { background: rgba(10, 35, 20, 0.95); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .suggestions div {
            padding: 12px 20px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 15px; color: var(--primary-text); font-weight: 500;
        }
        body.dark-mode .suggestions div { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .suggestions div:hover { background: var(--accent-bg); color: var(--accent-dark); }
        body.dark-mode .suggestions div:hover { color: white; }

        /* --- WARNING MESSAGE --- */
        .rotate-warning {
            display: none; 
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #ffeeba;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }
        body.dark-mode .rotate-warning { background: rgba(217, 119, 6, 0.2); color: #fcd34d; border-color: #d97706; }
        .rotate-warning i { margin-right: 5px; color: var(--warning-color); }

        /* --- TABLE SECTION --- */
        .result-panel {
            background: rgba(255, 255, 255, 0.30); 
            backdrop-filter: blur(15px); border-radius: 24px; padding: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            transition: background 0.5s, border-color 0.5s;
            width: 100%; box-sizing: border-box; /* Đảm bảo không tràn box */
        }
        body.dark-mode .result-panel { background: rgba(5, 25, 15, 0.6); }

        /* BỌC BẢNG TRONG WRAPPER ĐỂ CUỘN NGANG KHI DỮ LIỆU NHIỀU */
        .result-table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%; border-collapse: separate; border-spacing: 4px;
            margin-bottom: 20px;
            min-width: 600px; /* Đảm bảo cột không bị ép nhỏ quá, >4 thuốc sẽ tự cuộn ngang */
        }

        th {
            background: var(--accent-color); color: white;
            padding: 12px; border-radius: 8px;
            font-size: 14px; font-weight: 700; text-transform: uppercase;
        }
        body.dark-mode th { background: var(--accent-dark); color: #05190f; }
        
        td {
            padding: 10px; text-align: center;
            background: rgba(255,255,255,0.35); 
            border-radius: 8px;
            font-size: 14px; color: var(--primary-text);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.2s, background 0.5s, color 0.5s;
        }
        body.dark-mode td { background: rgba(10, 35, 20, 0.5); border-color: rgba(100, 255, 150, 0.15); }

        @media (min-width: 500px) { /* PC Giao diện */
            th { font-size: 16px; padding: 15px; }
            td { font-size: 16px; padding: 14px; }
            td:first-child { font-size: 16px; }
        }

        td:first-child { 
            text-align: center; 
            font-weight: 700; color: var(--accent-dark);
            background: rgba(255,255,255,0.65);
            min-width: 120px;
        }
        body.dark-mode td:first-child { background: rgba(15, 50, 25, 0.8); color: white; }

        /* GIẢM CHIỀU CAO TÊN THUỐC TRONG DANH SÁCH */
        .selected-drugs td { text-align: left; padding: 8px 15px; background: rgba(255,255,255,0.35); }
        body.dark-mode .selected-drugs td { background: rgba(10, 35, 20, 0.5); }
        .selected-drugs tr:hover td { background: rgba(255,255,255,0.8); }
        body.dark-mode .selected-drugs tr:hover td { background: rgba(15, 50, 25, 0.8); }

        .compatible { background-color: #dcfce7 !important; color: #166534 !important; font-weight: bold; border: 1px solid #86efac !important; }
        body.dark-mode .compatible { background-color: rgba(22, 101, 52, 0.4) !important; color: #86efac !important; border-color: #22c55e !important; }
        
        .incompatible { background-color: #fee2e2 !important; color: #991b1b !important; font-weight: bold; border: 1px solid #fca5a5 !important; }
        body.dark-mode .incompatible { background-color: rgba(153, 27, 27, 0.4) !important; color: #fca5a5 !important; border-color: #ef4444 !important; }
        
        .na { background-color: var(--na-bg) !important; color: #854d0e !important; border: 1px solid #fde047 !important; }
        body.dark-mode .na { color: #fde047 !important; border-color: #eab308 !important; }
        
        .controversial { background-color: #ffedd5 !important; color: #9a3412 !important; font-weight: bold; border: 1px solid #fdba74 !important; }
        body.dark-mode .controversial { background-color: rgba(154, 52, 18, 0.4) !important; color: #fdba74 !important; border-color: #f97316 !important; }
        
        .self-intersection { background-color: rgba(0,0,0,0.05) !important; color: #cbd5e1 !important; }
        body.dark-mode .self-intersection { background-color: rgba(255, 255, 255, 0.05) !important; color: #64748b !important; }

        /* GIẢM SIZE NÚT DELETE ĐỂ PHÙ HỢP CHIỀU CAO HÀNG */
        .delete-btn {
            background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5;
            width: 28px; height: 28px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: all 0.2s; float: right;
        }
        body.dark-mode .delete-btn { background: rgba(153, 27, 27, 0.4); color: #fca5a5; border-color: #ef4444; }
        .delete-btn:hover { background: #dc2626; color: white; transform: rotate(90deg); }

        .legend { 
            margin-top: 15px; display: none; text-align: center; 
            background: rgba(255,255,255,0.25); padding: 15px; border-radius: 16px;
            transition: background 0.5s;
        }
        body.dark-mode .legend { background: rgba(10, 35, 20, 0.6); }
        .legend span { 
            display: inline-flex; align-items: center; gap: 6px;
            margin: 5px 10px; padding: 6px 12px; border-radius: 8px; 
            font-size: 13px; font-weight: 700;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .error-message { 
            display: none; margin: 20px 0; padding: 15px; 
            background: #fee2e2; color: #991b1b; border-radius: 12px;
            border: 1px solid #fca5a5; text-align: center; font-weight: 600;
        }
        body.dark-mode .error-message { background: rgba(153, 27, 27, 0.4); color: #fca5a5; border-color: #ef4444; }

        /* --- FOOTER BADGE TRONG MỜ --- */
        footer {
            margin: 25px auto 10px auto; /* Căn giữa */
            text-align: center;
            color: var(--footer-text); 
            font-weight: 700;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: max-content; /* Thu gọn vừa chữ */
            max-width: 90%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.5s;
        }
        body.dark-mode footer { background: rgba(10, 35, 20, 0.5); border-color: rgba(100, 255, 150, 0.2); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(22, 163, 74, 0.3); border-radius: 10px; }
        body.dark-mode ::-webkit-scrollbar-thumb { background: rgba(74, 222, 128, 0.4); }

        /* =================================================================
           TỐI ƯU HÓA CAO CẤP CHO SMARTPHONE (Mobile Layout)
           ĐIỂM NEO (BREAKPOINT): < 500px
           ================================================================= */
        
        .mobile-results { display: none; }

        @media only screen and (max-width: 499px) {
            :root {
                --glass-bg: rgba(255, 255, 255, 0.05);  
                --glass-card: rgba(255, 255, 255, 0.35); 
            }

            /* --- CẤU HÌNH INPUT CHO MOBILE --- */
            input {
                color: #ffffff !important;
                text-shadow: 0 1px 3px rgba(0,0,0,0.5);
                background: rgba(255, 255, 255, 0.35); 
            }
            body.dark-mode input { color: var(--primary-text) !important; background: rgba(10, 35, 20, 0.6) !important; text-shadow: none; }
            
            /* KHI BẤM VÀO (FOCUS) */
            input:focus {
                background: #ffffff !important;
                color: #334155 !important; 
                text-shadow: none !important; 
                box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.2);
            }
            body.dark-mode input:focus { background: rgba(15, 45, 25, 0.9) !important; color: white !important; }

            input::placeholder { color: rgba(255, 255, 255, 0.8) !important; }
            input:focus::placeholder { color: #94a3b8 !important; }

            body { padding: 5px; overflow-x: hidden;} 
            
            .container { 
                width: 100%; 
                max-width: 100%; 
                margin: 0; 
                padding: 0;
            }

            header { 
                width: 100%;
                padding: 12px; 
                margin-bottom: 12px; 
                border-radius: 16px; 
            }
            header h2 { font-size: 16px; flex-direction: row; gap: 8px; }
            .theme-btn i { font-size: 32px; } /* Icon nhỏ hơn trên mobile */

            .search-container { 
                width: 100%;
                flex-direction: column; 
                padding: 12px; 
                gap: 8px; 
                border-radius: 20px; 
                margin-bottom: 15px; 
            }
            .input-wrapper { width: 100%; }
            input { padding: 10px 15px; font-size: 16px !important; height: 42px; }
            .btn-search { width: 100%; margin-top: 0; padding: 10px; font-size: 14px; height: 42px; display: flex; align-items: center; justify-content: center; gap: 8px; }

            .result-table-wrapper { display: none !important; }
            
            .result-panel {
                padding: 12px; 
                width: 100%; 
                display: flex;
                flex-direction: column;
                align-items: stretch; 
                box-sizing: border-box;
            }

            table { width: 100%; border-spacing: 0; }

            .mobile-results { 
                display: flex; 
                flex-direction: column; 
                gap: 8px; 
                width: 100%; 
            }

            .m-card {
                background: var(--glass-card);
                backdrop-filter: blur(8px);
                border: 1px solid var(--glass-border);
                border-radius: 10px; 
                overflow: hidden;
                width: 100%; 
                box-sizing: border-box; 
            }
            body.dark-mode .m-card { background: rgba(10, 35, 20, 0.65); }
            
            .m-card-header {
                background: var(--accent-color);
                color: white;
                padding: 6px 10px; 
                font-weight: 700;
                font-size: 10px; 
                text-align: center; 
            }
            body.dark-mode .m-card-header { background: var(--accent-dark); color: #05190f; }
            
            .m-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 2px 8px;
                border-bottom: 1px solid rgba(0,0,0,0.1); 
                font-size: 11px; 
                flex-wrap: wrap; 
                line-height: 1.2;
            }
            body.dark-mode .m-row { border-bottom-color: rgba(255,255,255,0.05); }
            .m-row:last-child { border-bottom: none; }
            
            .m-drug-name { 
                font-weight: 500; 
                color: var(--primary-text); 
                word-break: break-word; 
                max-width: 70%; 
            }
            .m-badge {
                padding: 1px 6px;
                border-radius: 10px;
                font-weight: 700;
                font-size: 9px; 
                min-width: 50px;
                text-align: center;
                flex-shrink: 0; 
            }

            .legend { text-align: left; padding: 8px; margin-top: 10px; }
            .legend span { 
                display: flex; width: 100%; margin: 2px 0; 
                justify-content: flex-start; 
                font-size: 11px; 
                padding: 3px 6px;
            }
            
            .selected-drugs tr {
                display: flex; 
                align-items: center; 
                justify-content: space-between; 
                padding: 4px 8px; /* Giảm padding trên Mobile */
                background: var(--glass-card);
                border-radius: 10px; 
                margin-bottom: 5px;
                border: 1px solid var(--glass-border);
                width: 100%; 
                box-sizing: border-box;
            }
            body.dark-mode .selected-drugs tr { background: rgba(10, 35, 20, 0.65); }
            
            .selected-drugs td { 
                display: block; 
                border: none; 
                background: transparent !important; 
                padding: 0;
                font-size: 13px;
            }
            
            .selected-drugs td:first-child { 
                text-align: left; 
                font-weight: 600; 
                flex: 1; 
            }
            
            .selected-drugs td:last-child { width: auto; padding-left: 10px; }
            .delete-btn { width: 24px; height: 24px; font-size: 12px; }
            
            footer { font-size: 11px; padding: 6px; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <div class="container">
        <header>
            <h2>
                <button class="theme-btn" onclick="toggleTheme()" title="Chuyển chế độ Sáng/Tối">
                    <i class="fas fa-flask"></i>
                </button>
                Tra cứu tương hợp - tương kỵ
            </h2>
        </header>

        <div class="search-container">
            <div class="input-wrapper">
                <input type="text" id="searchInput" placeholder="Nhập tên hoạt chất..." autocomplete="off">
                <div class="suggestions" id="suggestions"></div>
            </div>
            <button id="actionBtn" class="btn-search" onclick="searchCompatibility()">
                <i class="fas fa-search"></i> Tạo bảng kết quả
            </button>
        </div>

        <div class="error-message" id="errorMessage"></div>
        
        <div id="rotateWarning" class="rotate-warning">
            <i class="fas fa-sync-alt fa-spin"></i> Bạn đã chọn nhiều thuốc. Hãy xoay ngang điện thoại để hiển thị kết quả tốt nhất.
        </div>

        <div class="result-panel">
            <div class="result-table-wrapper" id="desktopTableWrapper">
                <table>
                    <thead>
                        <tr><th id="tableHeaderTitle" colspan="100">THÔNG TIN KẾT QUẢ</th></tr>
                    </thead>
                    <tbody id="tableBody" class="selected-drugs">
                        <tr><td colspan="2" style="text-align: center; color: var(--empty-text); border: none; background: transparent;">Vui lòng nhập hoạt chất để tra cứu</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="mobile-results" id="mobileResults"></div>

            <div id="legend" class="legend">
                <span class="compatible"><i class="fas fa-check"></i> C: Tương hợp</span>
                <span class="incompatible"><i class="fas fa-times"></i> I: Tương kỵ</span>
                <span class="na"><i class="fas fa-question"></i> N: Không có thông tin</span>
                <span class="controversial"><i class="fas fa-exclamation-triangle"></i> V: Mâu thuẫn giữa các tài liệu (Hỏi ý kiến dược sĩ)</span>
            </div>
        </div>
        
        <footer>Khoa Dược - BVĐK Tuyên Quang</footer>
    </div>

    <script>
        // ── LOGIC CHUYỂN ĐỔI THEME ──
        function initTheme() {
            const savedTheme = localStorage.getItem('y_site_theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        }
        initTheme();

        function toggleTheme() {
            if (document.body.classList.contains('dark-mode')) {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('y_site_theme', 'light');
            } else {
                document.body.classList.add('dark-mode');
                localStorage.setItem('y_site_theme', 'dark');
            }
        }

        let jsonData = null;
        let selectedDrugs = [];
        let suggestionsList = [];
        let isTableGenerated = false; 

        function normalizeString(str) { return str.trim().toLowerCase().replace(/\s+/g,' '); }

        async function fetchData() {
            const tableBody = document.getElementById("tableBody");
            const errorMessage = document.getElementById("errorMessage");
            
            // Xử lý hiển thị ban đầu đúng chuẩn Responsive
            if(window.innerWidth <= 499) {
                document.getElementById("desktopTableWrapper").style.display = "none";
                document.getElementById("mobileResults").style.display = "block";
            } else {
                document.getElementById("desktopTableWrapper").style.display = "block";
                document.getElementById("mobileResults").style.display = "none";
            }
            
            try {
                const response = await fetch('tuong_ky_thuoc.json?t=' + new Date().getTime()); 
                jsonData = await response.json();
                suggestionsList = [...new Set(jsonData.incompatibilities.flatMap(item => [item.drug1, item.drug2]))].sort();
                updateSelectedDrugsTable();
            } catch (error) {
                tableBody.innerHTML = `<tr><td colspan="2" style="text-align: center; border: none; background: transparent;">Lỗi khi tải dữ liệu</td></tr>`;
                errorMessage.textContent = `LỖI: ${error.message}`;
                errorMessage.style.display = "block";
            }
        }

        function checkRotationWarning() {
            const warning = document.getElementById('rotateWarning');
            if (window.innerWidth <= 499 && selectedDrugs.length >= 3) {
                warning.style.display = 'block'; 
            } else {
                warning.style.display = 'none'; 
            }
        }

        function setButtonToUpdateMode() {
            const btn = document.getElementById('actionBtn');
            if (isTableGenerated) {
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> Cập nhật kết quả';
                btn.className = 'btn-search'; 
                btn.setAttribute('onclick', 'searchCompatibility()');
            } else {
                btn.innerHTML = '<i class="fas fa-search"></i> Tạo bảng kết quả';
                btn.className = 'btn-search';
                btn.setAttribute('onclick', 'searchCompatibility()');
            }
        }

        function addDrugToTable(drug) {
            if (!selectedDrugs.includes(drug)) { 
                selectedDrugs.push(drug); 
                checkRotationWarning(); 
                
                isTableGenerated = false; 
                updateSelectedDrugsTable(); 
                
                const btn = document.getElementById('actionBtn');
                btn.innerHTML = '<i class="fas fa-search"></i> Tạo bảng kết quả';
                btn.className = 'btn-search';
                btn.setAttribute('onclick', 'searchCompatibility()');
            }
        }

        function removeDrug(drug) {
            selectedDrugs = selectedDrugs.filter(d => d !== drug);
            checkRotationWarning(); 
            if (!isTableGenerated) {
                updateSelectedDrugsTable();
            } else {
                setButtonToUpdateMode();
            }
        }

        function updateSelectedDrugsTable() {
            const isMobile = window.innerWidth <= 499;
            
            if(isMobile) {
                document.getElementById("desktopTableWrapper").style.display = "none";
                document.getElementById("mobileResults").style.display = "block";
            } else {
                document.getElementById("desktopTableWrapper").style.display = "block";
                document.getElementById("mobileResults").style.display = "none";
            }

            document.getElementById("mobileResults").innerHTML = ""; 

            const tableBody = document.getElementById("tableBody");
            tableBody.classList.add("selected-drugs"); 
            document.getElementById("legend").style.display = "none";
            document.getElementById("tableHeaderTitle").textContent = "THÔNG TIN KẾT QUẢ";

            tableBody.innerHTML = "";
            if (selectedDrugs.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="2" style="text-align: center; color: var(--empty-text); border: none; background: transparent;">Danh sách trống. Vui lòng nhập tên thuốc.</td></tr>`;
                document.getElementById("mobileResults").innerHTML = `<div style="text-align: center; color: var(--empty-text); padding: 20px;">Danh sách trống. Vui lòng nhập tên thuốc.</div>`;
                return;
            }
            
            // Xây dựng cho Desktop
            tableBody.innerHTML = selectedDrugs.map(drug => `
                <tr>
                    <td>${drug}</td>
                    <td style="width: 50px;">
                        <button type="button" class="delete-btn" onclick="removeDrug('${drug.replace(/'/g,"\\'")}')"><i class="fas fa-times"></i></button>
                    </td>
                </tr>`).join('');
                
            // Xây dựng cho Mobile
            document.getElementById("mobileResults").innerHTML = `
                <table style="width:100%; border-spacing:0;">
                    <tbody class="selected-drugs">
                        ${selectedDrugs.map(drug => `
                        <tr>
                            <td>${drug}</td>
                            <td style="width: 40px; padding-left: 0; text-align: right;">
                                <button type="button" class="delete-btn" style="float:none; display:inline-flex;" onclick="removeDrug('${drug.replace(/'/g,"\\'")}')"><i class="fas fa-times"></i></button>
                            </td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            `;
        }

        function showSuggestions() {
            const input = normalizeString(document.getElementById("searchInput").value);
            const suggestionsBox = document.getElementById("suggestions");
            if (!input) { suggestionsBox.style.display='none'; return; }
            const filtered = suggestionsList.filter(item => normalizeString(item).includes(input));
            if (filtered.length === 0) { suggestionsBox.style.display='none'; return; }
            suggestionsBox.innerHTML = filtered.map(item => `<div onclick="selectSuggestion('${item.replace(/'/g,"\\'")}')">${item}</div>`).join('');
            suggestionsBox.style.display='block';
        }

        function selectSuggestion(value) {
            document.getElementById("searchInput").value = ""; 
            document.getElementById("suggestions").style.display='none';
            addDrugToTable(value);
            document.getElementById("searchInput").focus();
        }

        function resetTable() {
            selectedDrugs = [];
            isTableGenerated = false; 
            document.getElementById("errorMessage").style.display='none';
            document.getElementById("rotateWarning").style.display='none'; 
            updateSelectedDrugsTable();
            
            const btn = document.getElementById('actionBtn');
            btn.innerHTML = '<i class="fas fa-search"></i> Tạo bảng kết quả';
            btn.className = 'btn-search'; 
            btn.setAttribute('onclick', 'searchCompatibility()');
        }

        function toggleCell(cell, symbol, text) {
            if (cell.textContent.trim() === symbol) {
                cell.textContent = text;
                cell.style.fontSize = "12px"; 
                cell.style.padding = "5px";
            } 
            else {
                cell.textContent = symbol;
                cell.style.fontSize = ""; 
                cell.style.padding = "";
            }
        }

        function searchCompatibility() {
            const tableBody = document.getElementById("tableBody");
            const mobileResults = document.getElementById("mobileResults");
            const errorMessage = document.getElementById("errorMessage");
            
            tableBody.classList.remove("selected-drugs");
            tableBody.innerHTML="";
            mobileResults.innerHTML="";
            errorMessage.style.display='none';

            if (selectedDrugs.length < 2) {
                errorMessage.innerHTML = "<i class='fas fa-exclamation-circle'></i> VUI LÒNG CHỌN ÍT NHẤT HAI HOẠT CHẤT ĐỂ SO SÁNH";
                errorMessage.style.display='block';
                isTableGenerated = false;
                updateSelectedDrugsTable();
                return;
            }

            isTableGenerated = true;
            document.getElementById("tableHeaderTitle").textContent = "THÔNG TIN KẾT QUẢ";

            const isMobile = window.innerWidth <= 499;
            
            if(isMobile) {
                document.getElementById("desktopTableWrapper").style.display = "none";
                mobileResults.style.display = "block";
            } else {
                document.getElementById("desktopTableWrapper").style.display = "block";
                mobileResults.style.display = "none";
            }

            // --- 1. GENERATE DESKTOP TABLE (MATRIX) ---
            let tableHtml = '<tr><td style="background:var(--th-bg); color:var(--th-text); font-weight:800; text-align:center; vertical-align:middle; border-radius:8px; border: none;">THUỐC</td>'; 
            selectedDrugs.forEach(drug=>{tableHtml+=`<td style="font-weight:bold; background:var(--accent-bg); color:var(--accent-dark); border-color: transparent;">${drug}</td>`});
            tableHtml+='</tr>';

            // --- 2. GENERATE MOBILE LIST (CARD VIEW) ---
            let mobileHtml = '<div class="mobile-results" style="display:flex;">';

            selectedDrugs.forEach((drug1,index1)=>{
                tableHtml+=`<tr><td style="font-weight:bold; background:var(--accent-bg); color:var(--accent-dark); text-align:center; border-color: transparent;">${drug1}</td>`;
                
                mobileHtml += `<div class="m-card"><div class="m-card-header">${drug1}</div>`;

                selectedDrugs.forEach((drug2,index2)=>{
                    let statusClass = "na";
                    let statusText = "N";
                    let statusLabel = "Không rõ";

                    if(index1===index2){ 
                        tableHtml+='<td class="self-intersection"><i class="fas fa-minus"></i></td>'; 
                    } else {
                        const pair = jsonData.incompatibilities.find(item=>
                            (normalizeString(item.drug1)===normalizeString(drug1) && normalizeString(item.drug2)===normalizeString(drug2)) ||
                            (normalizeString(item.drug1)===normalizeString(drug2) && normalizeString(item.drug2)===normalizeString(drug1))
                        );
                        if(pair){ 
                            if(pair.status==="incompatible"){ statusClass="incompatible"; statusText="I"; statusLabel="Tương kỵ"; }
                            else if(pair.status==="unknown"){ statusClass="na"; statusText="N"; statusLabel="Không rõ"; }
                            else if(pair.status==="compatible"){ statusClass="compatible"; statusText="C"; statusLabel="Tương hợp"; }
                            else if(pair.status==="controversial"){ statusClass="controversial"; statusText="V"; statusLabel="Mâu thuẫn"; }
                        }
                        
                        tableHtml+=`<td class="${statusClass}" onclick="toggleCell(this, '${statusText}', '${statusLabel}')" style="cursor:pointer; user-select:none;">${statusText}</td>`;

                        mobileHtml += `
                            <div class="m-row">
                                <span class="m-drug-name">vs ${drug2}</span>
                                <span class="m-badge ${statusClass}">${statusLabel}</span>
                            </div>
                        `;
                    }
                });
                
                tableHtml+='</tr>';
                mobileHtml += `</div>`; 
            });
            
            mobileHtml += '</div>';

            tableBody.innerHTML = tableHtml; 
            mobileResults.innerHTML = mobileHtml; 
            
            document.getElementById("legend").style.display="block";

            const btn = document.getElementById('actionBtn');
            btn.innerHTML = '<i class="fas fa-redo"></i> Làm lại';
            btn.className = 'btn-search btn-reset'; 
            btn.setAttribute('onclick', 'resetTable()');
        }

        document.getElementById("searchInput").addEventListener("input", showSuggestions);
        document.getElementById("searchInput").addEventListener("keypress", function(event){
            if(event.key==="Enter"){
                const suggestions=document.getElementById("suggestions");
                if(suggestions.style.display==="block" && suggestions.children.length>0){
                    selectSuggestion(suggestions.children[0].textContent);
                }
            }
        });

        document.addEventListener('click', function(e) {
            const suggestions = document.getElementById('suggestions');
            const searchInput = document.getElementById('searchInput');
            if (!suggestions.contains(e.target) && e.target !== searchInput) {
                suggestions.style.display = 'none';
            }
        });

        // Resize: Đổi View PC / Mobile
        window.addEventListener('resize', function(){
            checkRotationWarning();
            
            const isMobile = window.innerWidth <= 499;
            const desktopWrapper = document.getElementById("desktopTableWrapper");
            const mobileResults = document.getElementById("mobileResults");
            
            if(isTableGenerated) {
                if(isMobile) {
                    desktopWrapper.style.display = "none";
                    mobileResults.style.display = "block";
                } else {
                    desktopWrapper.style.display = "block";
                    mobileResults.style.display = "none";
                }
            } else {
                updateSelectedDrugsTable();
            }
        });

        window.onload = fetchData;
    </script>
</body>
</html>
